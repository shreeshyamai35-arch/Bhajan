# BhajanForge — lightweight CPU-only stack (Qdrant + MCP servers + API).
# No GPU containers: all heavy AI runs via cloud APIs.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  suno-mcp:
    build: .
    command: ["python", "-m", "bhajanforge.mcp_servers.suno_mcp"]
    env_file: [.env]
    depends_on: [qdrant]

  rvc-mcp:
    build: .
    command: ["python", "-m", "bhajanforge.mcp_servers.rvc_mcp"]
    env_file: [.env]

  stem-mcp:
    build: .
    command: ["python", "-m", "bhajanforge.mcp_servers.stem_mcp"]
    env_file: [.env]

  audio-mcp:
    build: .
    command: ["python", "-m", "bhajanforge.mcp_servers.audio_mcp"]
    env_file: [.env]

  api:
    build: .
    command: ["bhajanforge", "serve", "--host", "0.0.0.0", "--port", "8000"]
    env_file: [.env]
    ports:
      - "8000:8000"
    depends_on: [qdrant]
    volumes:
      - ./runs:/app/runs
      - ./output:/app/output

volumes:
  qdrant_storage:
